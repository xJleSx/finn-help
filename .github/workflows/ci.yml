name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff check
        run: uv run ruff check src/

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: finn
          POSTGRES_PASSWORD: finn
          POSTGRES_DB: finn
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finn -d finn"
          --health-interval 5s
          --health-timeout 2s
          --health-retries 10
    env:
      JWT_SECRET: ci-test-secret
      DATABASE_URL: postgresql+asyncpg://finn:finn@localhost:5432/finn
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --group dev

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -U finn -d finn && break
            echo "Waiting for Postgres... ($i)"
            sleep 2
          done

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Run tests with coverage
        run: uv run pytest tests/ --cov=src --cov-report=xml --cov-report=term -q 2>&1; echo "EXIT_CODE=$?"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --group dev

      - name: pip-audit
        run: uv run pip-audit --ignore-vuln PYSEC-2025-1 --ignore-vuln PYSEC-2026-2
        continue-on-error: true

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
